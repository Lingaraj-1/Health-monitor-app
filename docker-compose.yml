services:
  db:
    image: postgres:15-alpine
    container_name: health_db_con
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: health_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports: 
      - "5432:5432"
  app:
    build: .
    container_name: health_app_con
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: secret
      DB_NAME: health_db
    ports:
      - "8080:8080"
volumes:
  postgres_data: 
